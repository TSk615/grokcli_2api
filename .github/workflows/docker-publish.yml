name: Build and push GHCR

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # GHCR / Docker image names must be lowercase
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image name
        run: |
          set -euo pipefail
          # github.repository may preserve owner casing; Docker requires lowercase
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Read APP_VERSION
        id: ver
        run: |
          set -euo pipefail
          V=$(python3 -c 'import re,pathlib; t=pathlib.Path("grok2api/app.py").read_text(encoding="utf-8"); m=re.search(r"APP_VERSION\s*=\s*\"([^\"]+)\"", t); assert m, "APP_VERSION not found"; print(m.group(1))')
          echo "app_version=$V" >> "$GITHUB_OUTPUT"
          echo "APP_VERSION=$V"

      - name: Gate tag matches APP_VERSION
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          APP="${{ steps.ver.outputs.app_version }}"
          echo "tag=$TAG app=$APP"
          if [[ "$TAG" != "$APP" ]]; then
            echo "ERROR: git tag v$TAG must equal APP_VERSION $APP in grok2api/app.py" >&2
            exit 1
          fi

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short
            type=raw,value=${{ steps.ver.outputs.app_version }},enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build admin assets (optional)
        run: |
          python3 -m pip install --quiet --upgrade pip || true
          python3 scripts/build_admin_assets.py || true

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
