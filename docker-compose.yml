# Parallel deployment stack (does not collide with original grokcli-2api).
# Containers / network / volume / host port are all renamed.
name: grokcli-2api-lite

services:
  # Redis / Postgres are internal-only (no host port publish).
  # App reaches them via the compose network: redis:6379 / postgres:5432.
  redis:
    image: redis:7-alpine
    container_name: grokcli-2api-lite-redis
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--appendfsync",
        "everysec",
        "--maxmemory-policy",
        "noeviction",
      ]
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
    volumes:
      - grok2api_lite_redis:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: grokcli-2api-lite-postgres
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
      PGTZ: "${TZ:-Asia/Shanghai}"
      POSTGRES_USER: grok2api
      POSTGRES_PASSWORD: grok2api
      POSTGRES_DB: grok2api
    volumes:
      - grok2api_lite_pg:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grok2api -d grok2api"]
      interval: 5s
      timeout: 5s
      retries: 10

  # App only (protocol registration / inline captcha removed)
  grokcli-2api-lite:
    build:
      context: .
      dockerfile: Dockerfile
    image: grokcli-2api-lite:local
    container_name: grokcli-2api-lite
    env_file:
      - path: .env
        required: false
    ports:
      # Host port 3010 avoids clashing with original stack on 3000.
      # Postgres/Redis stay internal-only (compose network).
      - "3010:3000"
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
      GROK2API_HOST: "0.0.0.0"
      GROK2API_PORT: "3000"
      GROK2API_OPEN_BROWSER: "0"
      GROK2API_TOKEN_MAINTAIN: "1"
      GROK2API_MODEL_HEALTH: "1"
      GROK2API_REASONING_COMPAT: "off"
      GROK2API_STORE_BACKEND: "hybrid"
      # Multi-worker: default 2 (enough for hybrid; override via .env for large hosts)
      GROK2API_WORKERS: "${GROK2API_WORKERS:-2}"
      GROK2API_ASYNC_ACCOUNT_STATS: "${GROK2API_ASYNC_ACCOUNT_STATS:-1}"
      GROK2API_ASYNC_ACCOUNT_STATE: "${GROK2API_ASYNC_ACCOUNT_STATE:-1}"
      GROK2API_ASYNC_USAGE: "${GROK2API_ASYNC_USAGE:-1}"
      GROK2API_USAGE_EVENT_SAMPLE_RATE: "${GROK2API_USAGE_EVENT_SAMPLE_RATE:-0.05}"
      GROK2API_READY_INDEX_MODE: "${GROK2API_READY_INDEX_MODE:-shadow}"
      GROK2API_MAX_ACCOUNT_INFLIGHT: "${GROK2API_MAX_ACCOUNT_INFLIGHT:-2}"
      # In-stack service DNS (do not use 127.0.0.1 here)
      REDIS_URL: "redis://redis:6379/0"
      GROK2API_REDIS_URL: "redis://redis:6379/0"
      DATABASE_URL: "postgresql://grok2api:grok2api@postgres:5432/grok2api"
      GROK2API_DATABASE_URL: "postgresql://grok2api:grok2api@postgres:5432/grok2api"
    healthcheck:
      # $$ keeps substitution inside the container so override ports work
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:$${GROK2API_PORT:-3000}/health >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 40s
    volumes:
      - ./data-lite:/app/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    # Explicit aliases so external stacks can resolve this lite instance
    networks:
      default:
        aliases:
          - grokcli-2api-lite
    restart: unless-stopped

  writer:
    build:
      context: .
      dockerfile: Dockerfile
    image: grokcli-2api-lite:local
    container_name: grokcli-2api-lite-writer
    env_file:
      - path: .env
        required: false
    command: ["python", "-m", "grok2api.writer"]
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
      GROK2API_STORE_BACKEND: "hybrid"
      GROK2API_WORKERS: "1"
      REDIS_URL: "redis://redis:6379/0"
      GROK2API_REDIS_URL: "redis://redis:6379/0"
      DATABASE_URL: "postgresql://grok2api:grok2api@postgres:5432/grok2api"
      GROK2API_DATABASE_URL: "postgresql://grok2api:grok2api@postgres:5432/grok2api"
      GROK2API_WRITER_BATCH_SIZE: "${GROK2API_WRITER_BATCH_SIZE:-500}"
      GROK2API_WRITER_FLUSH_SEC: "${GROK2API_WRITER_FLUSH_SEC:-1}"
      GROK2API_WRITER_MAX_RETRIES: "${GROK2API_WRITER_MAX_RETRIES:-8}"
      GROK2API_USAGE_EVENT_RETENTION_DAYS: "${GROK2API_USAGE_EVENT_RETENTION_DAYS:-30}"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  grok2api_lite_pg:
  grok2api_lite_redis:

# Fixed project network name so other compose stacks can join as external:
#   networks:
#     grokcli-lite-net:
#       name: grokcli-2api-lite_default
#       external: true
# Downstream DNS: http://grokcli-2api-lite:3000/v1
networks:
  default:
    name: grokcli-2api-lite_default
    driver: bridge
    labels:
      com.grokcli-2api.network: "lite-stack"
